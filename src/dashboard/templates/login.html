<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — AutoPost</title>
<script src="/static/tailwind.js"></script>
<style>
  body { background: #0a0f1a; }
</style>
</head>
<body class="text-gray-100 min-h-screen flex items-center justify-center">
<div class="w-full max-w-md px-6">

  <div class="text-center mb-8">
    <div class="text-4xl mb-3">📡</div>
    <h1 class="text-2xl font-bold text-white">AutoPost</h1>
    <p class="text-gray-500 text-sm mt-1">Crypto Social Media Automation</p>
  </div>

  <div class="rounded-2xl p-8" style="background:#111827;border:1px solid #1f2937;">
    <h2 class="text-lg font-bold text-white mb-6">Sign In</h2>

    {% if error %}
    <div class="mb-4 px-4 py-3 rounded-lg text-sm text-red-400" style="background:#1c0a0a;border:1px solid #7f1d1d;">
      {{ error }}
    </div>
    {% endif %}

    <form method="post" action="/login" class="space-y-4">
      <div>
        <label class="block text-xs text-gray-400 font-semibold mb-1 uppercase tracking-wider">Email</label>
        <input type="email" name="email" required autofocus
          class="w-full rounded-lg px-4 py-3 text-sm text-white focus:outline-none focus:border-blue-500"
          style="background:#0a0f1a;border:1px solid #374151;"
          placeholder="you@example.com">
      </div>
      <div>
        <label class="block text-xs text-gray-400 font-semibold mb-1 uppercase tracking-wider">Password</label>
        <input type="password" name="password" required
          class="w-full rounded-lg px-4 py-3 text-sm text-white focus:outline-none focus:border-blue-500"
          style="background:#0a0f1a;border:1px solid #374151;"
          placeholder="••••••••">
      </div>
      <button type="submit"
        class="w-full py-3 rounded-xl font-bold text-sm mt-2"
        style="background:#1d4ed8;color:#fff;border:none;cursor:pointer;">
        Sign In →
      </button>
    </form>

    <p class="text-center text-sm text-gray-500 mt-6">
      Don't have an account?
      <a href="/register" class="text-blue-400 hover:text-blue-300 font-medium">Register</a>
    </p>
  </div>

</div>
</body>
</html>
